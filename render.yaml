services:
  - type: web
    name: habitat-ml
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EE_PROJECT
        value: habitat-wip
      - key: FLASK_ENV
        value: production